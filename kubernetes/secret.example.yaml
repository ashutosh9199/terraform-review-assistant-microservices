# TEMPLATE ONLY — committed for reference. The real Secret is NEVER committed
# (kubernetes/secret.yaml is git-ignored). In CI, deploy.yml creates it from a
# GitHub Secret:
#
#   kubectl create secret generic tra-secrets -n production \
#     --from-literal=JWT_SECRET_KEY="$JWT_SECRET_KEY" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Locally you may copy this to secret.yaml and fill a strong value.
apiVersion: v1
kind: Secret
metadata:
  name: tra-secrets
  namespace: production
  labels:
    app.kubernetes.io/part-of: terraform-review-assistant
type: Opaque
stringData:
  JWT_SECRET_KEY: "replace-with-a-strong-random-value"
