apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production
  labels: { app: frontend, app.kubernetes.io/part-of: terraform-review-assistant }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      serviceAccountName: tra-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: frontend
          image: traaksacrorhf1p.azurecr.io/frontend:10ee779972eb7c3f3ace22b1778695af6bc43233
          ports: [{ containerPort: 8080 }]
          env:
            - name: GATEWAY_UPSTREAM
              value: "api-gateway:8000"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
