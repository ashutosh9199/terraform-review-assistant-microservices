apiVersion: apps/v1
kind: Deployment
metadata:
  name: rules-service
  namespace: production
  labels: { app: rules-service, app.kubernetes.io/part-of: terraform-review-assistant }
spec:
  replicas: 1
  selector:
    matchLabels: { app: rules-service }
  template:
    metadata:
      labels: { app: rules-service }
    spec:
      serviceAccountName: tra-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: rules-service
          image: traaksacrorhf1p.azurecr.io/rules-service:10ee779972eb7c3f3ace22b1778695af6bc43233
          ports: [{ containerPort: 8003 }]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: 8003 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /ready, port: 8003 }
            initialDelaySeconds: 5
            periodSeconds: 10
