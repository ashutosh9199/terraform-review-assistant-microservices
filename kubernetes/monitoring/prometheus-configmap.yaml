# Scrapes only api-gateway's /metrics (real HTTP request/latency metrics --
# see apps/api-gateway/app/main.py) rather than cluster-wide cAdvisor/node
# metrics. Keeps Prometheus's RBAC footprint at zero (no ClusterRole needed
# for node/pod discovery), consistent with this project's RBAC-minimal
# ServiceAccounts (capstone §7).
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: api-gateway
        static_configs:
          - targets: ["api-gateway.production.svc.cluster.local:8000"]
