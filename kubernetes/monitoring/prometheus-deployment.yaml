# Single-replica Prometheus, sized to fit the cluster's 4-vCPU subscription
# quota (see infra/terraform/environments/aks/terraform.tfvars). No
# PersistentVolume -- 6h retention in an emptyDir is enough for a live demo
# and avoids provisioning extra managed disks.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels: { app: prometheus, app.kubernetes.io/part-of: terraform-review-assistant }
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=6h
          ports: [{ containerPort: 9090 }]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 300m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: 9090 }
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: storage, mountPath: /prometheus }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels: { app.kubernetes.io/part-of: terraform-review-assistant }
spec:
  type: ClusterIP
  selector: { app: prometheus }
  ports:
    - { port: 9090, targetPort: 9090 }
