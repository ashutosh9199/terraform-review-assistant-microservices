# Auto-provisions the Prometheus datasource and one dashboard so Grafana shows
# real api-gateway traffic immediately on first login -- no manual clicking
# required for the live demo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: ""
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  api-gateway.json: |
    {
      "title": "API Gateway",
      "uid": "api-gateway",
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "time": { "from": "now-30m", "to": "now" },
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "Request rate by path",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[1m])) by (path)",
              "legendFormat": "{{path}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Request rate by status",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[1m])) by (status)",
              "legendFormat": "status {{status}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "p95 latency by path",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, path))",
              "legendFormat": "{{path}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
