# frontend is exposed externally via a LoadBalancer (gets an EXTERNAL-IP and is
# the single public entrypoint; its nginx reverse-proxies /api to the gateway).
# All other services are ClusterIP (internal-only).
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: production
  labels: { app: frontend }
spec:
  type: LoadBalancer
  selector: { app: frontend }
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: production
  labels: { app: api-gateway }
spec:
  type: ClusterIP
  selector: { app: api-gateway }
  ports:
    - { name: http, port: 8000, targetPort: 8000 }
---
apiVersion: v1
kind: Service
metadata:
  name: upload-service
  namespace: production
  labels: { app: upload-service }
spec:
  type: ClusterIP
  selector: { app: upload-service }
  ports:
    - { name: http, port: 8001, targetPort: 8001 }
---
