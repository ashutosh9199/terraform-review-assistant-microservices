# ServiceAccounts with minimal permissions (capstone §7 RBAC). None are bound to
# any Role/ClusterRole, so pods get zero Kubernetes API access by default.
#
# The upload-service account is federated to an Azure managed identity via
# Workload Identity: the client-id annotation is filled in at deploy time from
# the Terraform output `workload_identity_client_id`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: upload-service
  namespace: production
  annotations:
    azure.workload.identity/client-id: "__WORKLOAD_IDENTITY_CLIENT_ID__"
  labels:
    app.kubernetes.io/part-of: terraform-review-assistant
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tra-app
  namespace: production
  labels:
    app.kubernetes.io/part-of: terraform-review-assistant
