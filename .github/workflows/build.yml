name: build

# Capstone §C pipeline 1: lint & test -> build multistage images -> scan for
# vulnerabilities (security gate) -> push to ACR. Auth to Azure is via OIDC
# (no static credentials, nothing secret in logs).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for azure/login OIDC

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint & test gateway
        working-directory: apps/api-gateway
        run: |
          pip install -e ".[dev]"
          ruff check app tests
          pytest -q

      - name: Import-check microservices (isolated env each)
        run: |
          for svc in upload-service parser-service rules-service ai-review-service scoring-service reporting-service; do
            echo "::group::$svc"
            python -m venv "/tmp/venv-$svc"
            "/tmp/venv-$svc/bin/pip" install -q -r "apps/$svc/requirements.txt"
            (cd "apps/$svc" && "/tmp/venv-$svc/bin/python" -c "import app.main")
            echo "::endgroup::"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Lint & build frontend
        working-directory: apps/frontend
        run: |
          npm ci || npm install
          npm run lint
          npm run build

  build-scan-push:
    needs: lint-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - frontend
          - upload-service
          - parser-service
          - rules-service
          - ai-review-service
          - scoring-service
          - reporting-service
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t "${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${IMAGE_TAG}" \
            "apps/${{ matrix.service }}"

      # Security gate: fail the build on fixable HIGH/CRITICAL vulnerabilities.
      - name: Trivy image scan (gate)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}"
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # Push only on branch builds (never from pull requests).
      - name: Azure login (OIDC)
        if: github.event_name != 'pull_request'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Push to ACR
        if: github.event_name != 'pull_request'
        run: |
          az acr login --name "${{ vars.ACR_LOGIN_SERVER }}"
          docker push "${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service }}:${IMAGE_TAG}"
