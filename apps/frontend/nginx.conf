# Rendered at container start by the nginx entrypoint (envsubst) from
# /etc/nginx/templates/default.conf.template. ${GATEWAY_UPSTREAM} is the only
# env-substituted value; $host/$scheme/etc. are preserved as nginx runtime vars.
#
#   local docker-compose : GATEWAY_UPSTREAM=api:8000
#   AKS                  : GATEWAY_UPSTREAM=api-gateway:8000  (default)
#
# The SPA is built with VITE_API_BASE_URL="" so it calls the API same-origin at
# /api/*; nginx reverse-proxies that to the gateway. One external IP, no CORS.

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Lightweight liveness/readiness target for Kubernetes probes.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Reverse-proxy API calls to the gateway (same-origin for the browser).
  location /api/ {
    proxy_pass http://${GATEWAY_UPSTREAM};
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri /index.html;
  }
}
